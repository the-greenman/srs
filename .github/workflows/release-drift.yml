name: Release Drift

on:
  push:
  pull_request:

jobs:
  check-release-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout srs
        uses: actions/checkout@v4
        with:
          path: srs

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download srs CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download \
            --repo ${{ github.repository_owner }}/srs-rust \
            --pattern "srs-x86_64-unknown-linux-gnu.tar.gz" \
            --dir /tmp/srs-cli
          tar -xzf /tmp/srs-cli/srs-x86_64-unknown-linux-gnu.tar.gz -C /tmp/srs-cli
          chmod +x /tmp/srs-cli/srs

      - name: Run release drift check
        working-directory: srs
        env:
          SRS_CLI_PATH: /tmp/srs-cli/srs
        run: node scripts/check-release-drift.mjs
